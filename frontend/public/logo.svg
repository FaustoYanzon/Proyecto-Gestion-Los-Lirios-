<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Los Lirios SA">
  <title>Los Lirios SA</title>

  <!-- San Juan province silhouette (gold outline, background) -->
  <path d="M118,28 L196,38 L216,74 L208,150 L172,178 L120,168 L96,120 L100,60 Z"
        fill="none" stroke="#b08d3f" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Mountains inside the province (gold) -->
  <path d="M114,142 L140,90 L152,114 L168,78 L198,142 Z" fill="#b08d3f" opacity="0.9"/>
  <path d="M124,142 L140,90 L148,106 Z" fill="#d4b969"/>

  <!-- Lily (left, white petals with gold linework) -->
  <g stroke="#b08d3f" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- back petals -->
    <path d="M78,118 C58,96 54,68 68,46 C84,64 90,92 88,116 Z" fill="#fdfaf2"/>
    <path d="M86,116 C84,86 96,58 118,44 C118,72 108,98 94,118 Z" fill="#fdfaf2"/>
    <path d="M80,122 C56,118 38,104 32,82 C56,86 72,100 84,116 Z" fill="#fdfaf2"/>
    <!-- front petal -->
    <path d="M84,122 C74,140 56,152 36,152 C44,132 60,120 82,116 Z" fill="#fdfaf2"/>
    <!-- stamens -->
    <path d="M86,112 C90,98 96,86 104,76" fill="none" stroke-width="1.8"/>
    <path d="M84,112 C82,98 80,86 76,74" fill="none" stroke-width="1.8"/>
    <circle cx="104" cy="74" r="3" fill="#4a2145" stroke="none"/>
    <circle cx="75" cy="72" r="3" fill="#4a2145" stroke="none"/>
  </g>

  <!-- Vine: from the lily down to the top of the grape cluster -->
  <path d="M86,124 C94,150 118,162 156,158" stroke="#b08d3f" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>
  <!-- Vine leaf (gold) -->
  <path d="M116,164 C120,150 138,146 138,158 C136,168 120,170 116,164 Z" fill="#b08d3f" opacity="0.85"/>
  <!-- Tendril curling off the vine -->
  <path d="M150,158 C158,148 170,148 168,140 C166,134 158,136 160,142"
        stroke="#b08d3f" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Grape cluster (deep purple) -->
  <g fill="#4a2145">
    <circle cx="155" cy="163" r="9"/>
    <circle cx="173" cy="163" r="9"/>
    <circle cx="146" cy="179" r="9"/>
    <circle cx="164" cy="180" r="9"/>
    <circle cx="182" cy="179" r="9"/>
    <circle cx="155" cy="196" r="9"/>
    <circle cx="173" cy="196" r="9"/>
    <circle cx="164" cy="212" r="9"/>
  </g>
  <!-- Grape highlights -->
  <g fill="#8a5580" opacity="0.55">
    <circle cx="151.5" cy="159.5" r="2.8"/>
    <circle cx="169.5" cy="159.5" r="2.8"/>
    <circle cx="142.5" cy="175.5" r="2.8"/>
    <circle cx="160.5" cy="176.5" r="2.8"/>
    <circle cx="178.5" cy="175.5" r="2.8"/>
    <circle cx="151.5" cy="192.5" r="2.8"/>
    <circle cx="169.5" cy="192.5" r="2.8"/>
    <circle cx="160.5" cy="208.5" r="2.8"/>
  </g>

  <!-- Wordmark: LOS LIRIOS (purple) + SA (gold), separate text nodes
       because some renderers drop styled tspans -->
  <text x="32" y="256" text-anchor="start"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="600" letter-spacing="2" fill="#4a2145"
  >LOS LIRIOS</text>
  <text x="248" y="256" text-anchor="end"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="600" letter-spacing="2" fill="#b08d3f"
  >SA</text>
</svg>
